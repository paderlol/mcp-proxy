<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <filter id="keyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Flat Spotify green, macOS Big Sur squircle radius (22.37% of side) -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="#1DB954"/>

  <g filter="url(#keyShadow)"
     transform="translate(512 512) scale(1.25) translate(-512 -512)">

    <!-- Bow with keyhole negative space — the keyhole silhouette evokes
         "lock/secret" more than a plain circular cutout. -->
    <path fill="#ffffff" fill-rule="evenodd" d="
      M 450 400
      a112 112 0 1 0 0 224
      a112 112 0 1 0 0 -224 z
      M 418 486
      a32 32 0 1 1 64 0
      L 470 574
      L 430 574 Z
    "/>

    <!-- Decorative collar between bow and shaft for an ornate key feel -->
    <rect x="560" y="494" width="14" height="36" rx="4" fill="#ffffff"/>

    <!-- Tapered shaft — subtly narrower toward the teeth for classic
         skeleton-key silhouette (trapezoid with rounded ends). -->
    <path fill="#ffffff" d="
      M 586 494
      L 744 498
      Q 756 498 756 510
      L 756 514
      Q 756 526 744 526
      L 586 530
      Z
    "/>

    <!-- Teeth: one tall primary tooth + a shorter accent, rounded ends for
         a hand-drawn feel rather than pixel-sharp rectangles. -->
    <path fill="#ffffff" d="
      M 682 526
      L 718 526
      Q 726 526 726 534
      L 726 614
      Q 726 622 718 622
      L 690 622
      Q 682 622 682 614
      Z
    "/>
    <path fill="#ffffff" d="
      M 738 526
      L 762 526
      Q 770 526 770 534
      L 770 582
      Q 770 590 762 590
      L 746 590
      Q 738 590 738 582
      Z
    "/>
  </g>
</svg>
